<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Tabletop</title>

  <link rel="stylesheet" href="css/home.css">
</head>
<body>

  <div class="overlay"></div>

  <div class="container">

    <img src="assets/logo.jpg" class="logo">

    <p class="subtitle">
      Sistema online para partidas via webcam
    </p>

    <button id="createRoom" class="create-btn">
      Criar Sala
    </button>

    <div class="rooms-list">

      <div class="room-card">
        <h3>Mesa PvP</h3>

        <div class="room-info">
          <span>👥 2 jogadores</span>
          <span>👁 1 espectador</span>
        </div>

        <button>
          Entrar
        </button>
      </div>

    </div>

  </div>

  <script src="js/home.js"></script>

</body>
</html>
